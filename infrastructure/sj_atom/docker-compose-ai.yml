version: '3.8'

services:
  # The Interface (ChatGPT Clone) - Pointed at Bare-Metal Ollama
  ai-interface:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-interface
    network_mode: host
    environment:
      - TZ=Pacific/Auckland
      - OLLAMA_BASE_URL=http://localhost:11434
      - PORT=3000
      # Force Open WebUI to outsource embedding math to Ollama to save ARM CPU cycles
      - EMBEDDING_ENGINE=ollama
      - EMBEDDING_MODEL=nomic-embed-text
    volumes:
      - ./data/open-webui:/app/backend/data
    restart: unless-stopped

  # The Autonomous Brain (Agentic Background Workflows)
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: agent-brain
    ports:
      - "5678:5678"
    environment:
      - TZ=Pacific/Auckland
      - N8N_HOST=agent.atom.tailnet
      - WEBHOOK_URL=https://agent.atom.tailnet/
      - GENERIC_TIMEZONE=Pacific/Auckland
      - N8N_SECURE_COOKIE=false
      # Allow n8n to read and write physical files to the mapped /vault directory
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - N8N_RESTRICT_FILE_ACCESS_TO=/vault
    extra_hosts:
      # Gives n8n a secure tunnel directly to the host's bare-metal Ollama engine
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/n8n:/home/node/.n8n
      # Giving n8n write access to the Obsidian vault to build the Mind Map
      - ./data/obsidian_vault:/vault:rw
    restart: unless-stopped

  # Sovereign Meta-Search Engine (Allows AI to scrape the web privately)
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8082:8080"
    volumes:
      - ./data/searxng:/etc/searxng
    environment:
      - TZ=Pacific/Auckland
      - BASE_URL=http://search.atom.tailnet/
    restart: unless-stopped

  # The Secure Tunnel (P2P Sync for Obsidian)
  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Pacific/Auckland
    volumes:
      - ./data/syncthing:/config
      # Exposing the vault to Syncthing so it can beam the map to your devices
      - ./data/obsidian_vault:/obsidian_vault
    ports:
      - 8384:8384 # GUI
      - 22000:22000/tcp # Sync
      - 22000:22000/udp # Sync
      - 21027:21027/udp # Discovery
    restart: unless-stopped

  # Local Audio Transcription Engine (For Telegram Voice Notes)
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: whisper-api
    environment:
      - TZ=Pacific/Auckland
      - ASR_MODEL=base
      - ASR_ENGINE=openai_whisper
    ports:
      - "9000:9000"
    restart: unless-stopped

  # Sovereign Telegram Bridge (Polling, Zero Public Exposure)
  walkie-talkie:
    build: 
      context: .
      dockerfile: Dockerfile.walkie
    container_name: walkie-talkie
    environment:
      - TZ=Pacific/Auckland
      - TELEGRAM_TOKEN=8878217823:AAHvwnBXXbtH20nzh9tbr0G35Ac_Y9hWKgI
    volumes:
      - ./data/obsidian_vault:/vault:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - whisper
    restart: unless-stopped

  # Automated Flight Price Scanner
  flight-scanner:
    build:
      context: ./flight_scanner
      dockerfile: Dockerfile.scanner
    container_name: flight-scanner
    environment:
      - TZ=Pacific/Auckland
      - SERPAPI_KEY=b71b28492eff29d9d4c30946f57f92824b64f8ee2273ce6abf01005b4d08c952
      - TELEGRAM_TOKEN=8878217823:AAHvwnBXXbtH20nzh9tbr0G35Ac_Y9hWKgI
      - TELEGRAM_CHAT_ID=8309108979
      - FLY_FROM=DUD
      - FLY_TO=WLG
      - TARGET_PRICE=300
      - DATE_RANGE_DAYS=30
    restart: unless-stopped

  manual-server:
    image: nginx:alpine
    container_name: atom_manual_server
    ports:
      - "8080:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
    restart: unless-stopped
