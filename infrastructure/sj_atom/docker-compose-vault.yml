version: "3.8"

services:
  # The Diary: Lightweight, private, Twitter-like text journal
  memos:
    image: neosmemo/memos:stable
    container_name: memos
    volumes:
      - ./data/memos/:/var/opt/memos
    ports:
      - "5230:5230"
    restart: unless-stopped

  # Password Manager: Unhackable local bitwarden server
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    environment:
      - WEBSOCKET_ENABLED=true
      - SIGNUPS_ALLOWED=false
      - ADMIN_TOKEN=q9vM2xK5jP8cH3nZ7tR4wB1yF6gD0sL5
    volumes:
      - ./data/vw-data/:/data/
    ports:
      - "8083:80"
    restart: unless-stopped

  # DNA Parsing & Machine Learning Engine
  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: dna-parser
    user: root
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=dna_sovereign_secure_2026
    volumes:
      - ./data/dna-scripts/:/home/jovyan/work
    ports:
      - "8888:8888"
    restart: unless-stopped

  # The Offline Encyclopedia (Wikipedia, Gutenberg, etc.)
  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:latest
    container_name: kiwix
    command: "*.zim"
    volumes:
      - ./data/kiwix:/data
    ports:
      - "8081:8080"
    restart: unless-stopped
