version: "3.8"

services:
  # Audiobookshelf: Serves the generated audiobooks to her phone (Like a private Audible)
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    ports:
      - "13378:80"
    volumes:
      - ./data/audiobooks/audiobooks:/audiobooks
      - ./data/audiobooks/podcasts:/podcasts
      - ./data/audiobooks/config:/config
      - ./data/audiobooks/metadata:/metadata
    restart: unless-stopped

  # Audiobook Generator (TTS Factory): Ingests EPUBs and generates human-like audio
  epub2audiobook:
    image: ghcr.io/p0n1/epub_to_audiobook:latest
    container_name: epub-audio-factory
    environment:
      # EdgeTTS requires no API key and is highly optimized. 
      # If you get an OpenAI or Azure key later, you inject them here.
      - TTS_PROVIDER=EdgeTTS 
    ports:
      - "7860:7860" # WebUI port
    volumes:
      - ./data/audiobooks/audiobooks:/app/output # Drops the finished audiobooks right into Audiobookshelf's library folder
    command: 'python3 /app_src/main_ui.py --host 0.0.0.0 --port 7860'
    restart: unless-stopped
