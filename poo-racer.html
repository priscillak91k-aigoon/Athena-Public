<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💩 POO RACERS — Parker's Racing Game!</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            background: #1a1a2e;
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #header {
            width: 100%;
            max-width: 700px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 1rem;
            background: rgba(0, 0, 0, 0.4);
        }

        #lap-display {
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            color: #FFD600;
            letter-spacing: 2px;
        }

        #score-display {
            font-family: 'Bangers', cursive;
            font-size: 1.3rem;
            color: #80CBC4;
        }

        #streak-display {
            font-family: 'Bangers', cursive;
            font-size: 1.2rem;
            color: #FF9800;
        }

        /* CANVAS */
        #game-canvas {
            max-width: 700px;
            width: 100%;
            border-left: 3px solid rgba(255, 255, 255, 0.08);
            border-right: 3px solid rgba(255, 255, 255, 0.08);
            display: block;
        }

        /* CHALLENGE OVERLAY */
        #challenge-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 1rem;
            animation: fadeIn 0.25s ease;
        }

        #challenge-overlay.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        #challenge-box {
            background: linear-gradient(135deg, #1B2838, #2a3f5f);
            border: 3px solid #FFD600;
            border-radius: 24px;
            padding: 1.5rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px rgba(255, 214, 0, 0.3);
        }

        #challenge-timer-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        #challenge-timer-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #4CAF50, #FFD600, #f44336);
            border-radius: 4px;
            transition: width 0.1s linear;
        }

        #challenge-emoji {
            font-size: 4rem;
            margin-bottom: 0.3rem;
        }

        #challenge-q {
            font-family: 'Bangers', cursive;
            font-size: clamp(1.4rem, 5vw, 2.2rem);
            color: #FFD600;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        #challenge-hint {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 1rem;
            font-style: italic;
        }

        .answer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.6rem;
        }

        .answer-grid.two-col {
            grid-template-columns: repeat(2, 1fr);
        }

        .ans-btn {
            padding: 0.9rem 0.4rem;
            border-radius: 14px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            font-family: 'Bangers', cursive;
            font-size: clamp(1.3rem, 5vw, 2rem);
            color: #fff;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.15s, background 0.15s, border-color 0.15s;
        }

        .ans-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: scale(1.06);
        }

        .ans-btn.correct {
            background: rgba(76, 175, 80, 0.5);
            border-color: #4CAF50;
            transform: scale(1.1);
        }

        .ans-btn.wrong {
            background: rgba(244, 67, 54, 0.4);
            border-color: #f44336;
            animation: shake 0.4s;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-8px)
            }

            75% {
                transform: translateX(8px)
            }
        }

        #challenge-feedback {
            margin-top: 0.8rem;
            font-family: 'Bangers', cursive;
            font-size: 1.4rem;
            letter-spacing: 1px;
            min-height: 2rem;
        }

        /* MENU / SPEED BUBBLES */
        #menu-screen,
        #podium-screen {
            position: fixed;
            inset: 0;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            text-align: center;
            padding: 1rem;
        }

        #menu-screen.hidden,
        #podium-screen.hidden {
            display: none;
        }

        .big-title {
            font-family: 'Bangers', cursive;
            font-size: clamp(2.5rem, 10vw, 5rem);
            color: #FFD600;
            letter-spacing: 3px;
            text-shadow: 4px 4px 0 #8B4513;
        }

        .sub-title {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 700;
            margin: 0.5rem 0 1.5rem;
        }

        .level-btn {
            display: block;
            width: 100%;
            max-width: 320px;
            margin: 0.5rem auto;
            padding: 1rem 1.5rem;
            font-family: 'Bangers', cursive;
            font-size: 1.6rem;
            letter-spacing: 2px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .level-btn:hover {
            transform: scale(1.06);
        }

        .lvl1 {
            background: linear-gradient(135deg, #43A047, #66BB6A);
            color: #fff;
            box-shadow: 0 6px 20px rgba(67, 160, 71, 0.5);
        }

        .lvl2 {
            background: linear-gradient(135deg, #F57F17, #FFB300);
            color: #fff;
            box-shadow: 0 6px 20px rgba(245, 127, 23, 0.5);
        }

        .lvl3 {
            background: linear-gradient(135deg, #C62828, #E53935);
            color: #fff;
            box-shadow: 0 6px 20px rgba(198, 40, 40, 0.5);
        }

        .podium-box {
            background: linear-gradient(135deg, #3E2723, #5D4037);
            border: 4px solid #FFD600;
            border-radius: 24px;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 0 60px rgba(255, 214, 0, 0.4);
            margin: 1rem;
        }

        #podium-trophy {
            font-size: 5rem;
            animation: bounceTrophy 1s ease-in-out infinite;
            display: block;
        }

        @keyframes bounceTrophy {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-12px)
            }
        }

        #podium-title {
            font-family: 'Bangers', cursive;
            font-size: 3rem;
            color: #FFD600;
            letter-spacing: 2px;
        }

        #podium-stats {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 700;
            margin: 0.5rem 0;
        }

        .play-again-btn {
            margin-top: 1rem;
            padding: 0.9rem 2rem;
            font-family: 'Bangers', cursive;
            font-size: 1.6rem;
            letter-spacing: 2px;
            background: #FFD600;
            color: #1a1a2e;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 214, 0, 0.4);
            transition: transform 0.15s;
        }

        .play-again-btn:hover {
            transform: scale(1.06);
        }
    </style>
</head>

<body>

    <!-- ══════════════════════════════════
     MENU SCREEN
     ══════════════════════════════════ -->
    <div id="menu-screen">
        <div style="font-size:5rem; animation:bounceTrophy 1.5s ease-in-out infinite">💩</div>
        <div class="big-title">POO RACERS!</div>
        <p class="sub-title">Answer spelling questions to go FASTER! 🏁<br>Wrong answers SLOW you down!</p>
        <button class="level-btn lvl1" onclick="startGame(1)">🌱 EASY — Letters & Sounds</button>
        <button class="level-btn lvl2" onclick="startGame(2)">🔥 MEDIUM — Simple Words</button>
        <button class="level-btn lvl3" onclick="startGame(3)">💥 HARD — Spell It!</button>
        <p style="margin-top:1.2rem;font-size:0.85rem;color:rgba(255,255,255,0.4);">First to cross the finish line wins!
            3 laps!</p>
    </div>

    <!-- ══════════════════════════════════
     GAME HEADER
     ══════════════════════════════════ -->
    <div id="header">
        <div id="lap-display">LAP 1/3</div>
        <div id="streak-display">🔥 0 streak</div>
        <div id="score-display">⭐ 0 pts</div>
    </div>

    <!-- CANVAS -->
    <canvas id="game-canvas" width="700" height="320"></canvas>

    <!-- ══════════════════════════════════
     CHALLENGE OVERLAY
     ══════════════════════════════════ -->
    <div id="challenge-overlay" class="hidden">
        <div id="challenge-box">
            <div id="challenge-timer-bar">
                <div id="challenge-timer-fill"></div>
            </div>
            <div id="challenge-emoji">❓</div>
            <div id="challenge-q">Loading...</div>
            <div id="challenge-hint"></div>
            <div class="answer-grid" id="answers-grid"></div>
            <div id="challenge-feedback"></div>
        </div>
    </div>

    <!-- ══════════════════════════════════
     PODIUM SCREEN
     ══════════════════════════════════ -->
    <div id="podium-screen" class="hidden">
        <div class="podium-box">
            <span id="podium-trophy">🏆</span>
            <div id="podium-title">YOU WIN!</div>
            <div id="podium-stats"></div>
            <button class="play-again-btn" onclick="showMenu()">RACE AGAIN! 🔄</button>
        </div>
    </div>

    <script>
        // ══════════════════════════════════════════════════════
        //  QUESTION BANK
        // ══════════════════════════════════════════════════════
        const QUESTIONS = {
            1: [ // EASY — letters & sounds
                { emoji: '🍎', q: 'What letter does APPLE start with?', answers: ['A', 'B', 'C'], correct: 0, hint: 'Ap-ple!' },
                { emoji: '🐱', q: 'What letter does CAT start with?', answers: ['B', 'C', 'D'], correct: 1, hint: 'C is for Cat!' },
                { emoji: '🐶', q: 'What letter does DOG start with?', answers: ['D', 'E', 'F'], correct: 0, hint: 'D is for Dog!' },
                { emoji: '💩', q: 'What letter does POO start with?', answers: ['O', 'P', 'Q'], correct: 1, hint: 'P is for Poo! Hehe!' },
                { emoji: '🦊', q: 'What letter does FOX start with?', answers: ['E', 'F', 'G'], correct: 1, hint: 'F is for Fox!' },
                { emoji: '🌞', q: 'What letter does SUN start with?', answers: ['R', 'S', 'T'], correct: 1, hint: 'S is for Sun!' },
                { emoji: '🍌', q: 'What letter does BANANA start with?', answers: ['A', 'B', 'C'], correct: 1, hint: 'B is for Banana!' },
                { emoji: '🐘', q: 'What letter does ELEPHANT start with?', answers: ['D', 'E', 'F'], correct: 1, hint: 'E is for Elephant!' },
                { emoji: '💨', q: 'What letter does FART start with?', answers: ['E', 'F', 'G'], correct: 1, hint: 'F is for... Fart! 💨' },
                { emoji: '🏠', q: 'What letter does HOUSE start with?', answers: ['G', 'H', 'I'], correct: 1, hint: 'H is for House!' },
                { emoji: '🦁', q: 'What sound does LION start with?', answers: ['La', 'Ka', 'Da'], correct: 0, hint: 'LI-on!' },
                { emoji: '🐧', q: 'What letter comes after A?', answers: ['B', 'C', 'Z'], correct: 0, hint: 'A then B then C...' },
                { emoji: '🎈', q: 'What letter comes after B?', answers: ['A', 'C', 'D'], correct: 1, hint: 'A B C D...' },
                { emoji: '🎉', q: 'What letter comes after C?', answers: ['B', 'E', 'D'], correct: 2, hint: 'A B C D...' },
                { emoji: '🌈', q: 'What letter comes after D?', answers: ['C', 'F', 'E'], correct: 2, hint: 'A B C D E...' },
            ],
            2: [ // MEDIUM — simple words
                { emoji: '🐱', q: 'Which word means a small fluffy pet that meows?', answers: ['CAT', 'HAT', 'BAT'], correct: 0, hint: 'Rhymes with hat!' },
                { emoji: '🐶', q: 'Which word means a pet that barks?', answers: ['LOG', 'DOG', 'HOG'], correct: 1, hint: 'Rhymes with log!' },
                { emoji: '💩', q: 'Which word means what comes out of your bum?', answers: ['POO', 'BOO', 'ZOO'], correct: 0, hint: 'Hehe! Rhymes with boo!' },
                { emoji: '☀️', q: 'Which word means the big bright thing in the sky?', answers: ['FUN', 'BUN', 'SUN'], correct: 2, hint: 'Rhymes with fun!' },
                { emoji: '🐝', q: 'Which word means the buzzing insect?', answers: ['BEE', 'SEE', 'TEE'], correct: 0, hint: 'Bzzzz!' },
                { emoji: '🍕', q: 'Pick the correctly spelled food:', answers: ['PIZa', 'PIZZA', 'PISSA'], correct: 1, hint: 'Pee-tsa!' },
                { emoji: '🐸', q: 'Which is the correct spelling of the green jumping animal?', answers: ['FROG', 'FORG', 'FGRO'], correct: 0, hint: 'Rhymes with log!' },
                { emoji: '💨', q: 'Which is the correct word for a smelly tummy noise?', answers: ['FRAT', 'FART', 'FRTA'], correct: 1, hint: 'F-A-R-T! Say it out loud!' },
                { emoji: '🐖', q: 'Which word is the pink farm animal?', answers: ['BIG', 'GIP', 'PIG'], correct: 2, hint: 'Rhymes with big!' },
                { emoji: '🌙', q: 'Which word means what\'s in the night sky?', answers: ['NOOM', 'MOON', 'MUON'], correct: 1, hint: 'M-O-O-N!' },
                { emoji: '🏃', q: 'Which word means to move fast with your legs?', answers: ['RUN', 'NUR', 'URN'], correct: 0, hint: 'R-U-N!' },
                { emoji: '🌊', q: 'Which word means lots of water?', answers: ['SEA', 'AES', 'ESA'], correct: 0, hint: 'S-E-A!' },
            ],
            3: [ // HARD — spell it
                { emoji: '🐱', q: 'Spell the word for a meowing pet:', word: 'CAT', answers: ['CAT', 'ACT', 'TAC'], correct: 0 },
                { emoji: '🐶', q: 'Spell the word for a barking pet:', word: 'DOG', answers: ['GOD', 'DOG', 'OGD'], correct: 1 },
                { emoji: '💩', q: 'Spell the best word ever:', word: 'POO', answers: ['OPO', 'OOP', 'POO'], correct: 2 },
                { emoji: '💨', q: 'Spell the smelliest word:', word: 'FART', answers: ['FRAT', 'FART', 'RAFT'], correct: 1 },
                { emoji: '🐸', q: 'Spell the green jumping animal:', word: 'FROG', answers: ['FORG', 'GORF', 'FROG'], correct: 2 },
                { emoji: '🌙', q: 'Spell the big white thing in the sky at night:', word: 'MOON', answers: ['MOON', 'NOOM', 'MONE'], correct: 0 },
                { emoji: '🍕', q: 'Spell the round cheesy food:', word: 'PIZZA', answers: ['PIZZA', 'PIZAZ', 'PIAZA'], correct: 0 },
                { emoji: '🌈', q: 'Spell what appears after rain:', word: 'RAINBOW', answers: ['RAINBOW', 'RAINBO', 'RANBOW'], correct: 0 },
                { emoji: '🐘', q: 'Spell the biggest land animal:', word: 'ELEPHANT', answers: ['ELEFANT', 'ELEPHANT', 'ELAEPHANT'], correct: 1 },
                { emoji: '🏠', q: 'Spell where you live:', word: 'HOUSE', answers: ['HOUS', 'HOUSE', 'HOOSE'], correct: 1 },
                { emoji: '🌟', q: 'Spell the bright things in the night sky:', word: 'STAR', answers: ['STAR', 'SART', 'TSAR'], correct: 0 },
                { emoji: '🚽', q: 'Spell where poo goes:', word: 'TOILET', answers: ['TOIELT', 'TOLIET', 'TOILET'], correct: 2 },
            ]
        };

        // ══════════════════════════════════════════════════════
        //  AUDIO ENGINE
        // ══════════════════════════════════════════════════════
        let audioCtx = null;
        function getAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }

        function playEngineNote(freq, dur, vol = 0.08) {
            const ctx = getAudio();
            const o = ctx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = freq;
            const g = ctx.createGain(); g.gain.setValueAtTime(vol, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + dur);
        }

        function playBoost() {
            const ctx = getAudio();
            [400, 600, 900, 1300].forEach((f, i) => {
                const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.06); o.frequency.exponentialRampToValueAtTime(f * 1.5, ctx.currentTime + i * 0.06 + 0.15);
                const g = ctx.createGain(); g.gain.setValueAtTime(0.2, ctx.currentTime + i * 0.06); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.06 + 0.2);
                o.connect(g); g.connect(ctx.destination); o.start(ctx.currentTime + i * 0.06); o.stop(ctx.currentTime + i * 0.06 + 0.3);
            });
        }

        function playWrong() {
            const ctx = getAudio();
            const o = ctx.createOscillator(); o.type = 'sawtooth'; o.frequency.setValueAtTime(300, ctx.currentTime); o.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.4);
            const g = ctx.createGain(); g.gain.setValueAtTime(0.25, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
            o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.4);
        }

        function playWin() {
            const ctx = getAudio();
            const notes = [523, 659, 784, 1047, 784, 1047, 1319];
            notes.forEach((f, i) => {
                const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
                const g = ctx.createGain(); g.gain.setValueAtTime(0.2, ctx.currentTime + i * 0.13); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.13 + 0.2);
                o.connect(g); g.connect(ctx.destination); o.start(ctx.currentTime + i * 0.13); o.stop(ctx.currentTime + i * 0.13 + 0.25);
            });
        }

        function playChallengeBell() {
            const ctx = getAudio();
            [880, 1109].forEach((f, i) => {
                const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
                const g = ctx.createGain(); g.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.1); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.3);
                o.connect(g); g.connect(ctx.destination); o.start(ctx.currentTime + i * 0.1); o.stop(ctx.currentTime + i * 0.1 + 0.4);
            });
        }

        // ══════════════════════════════════════════════════════
        //  GAME STATE
        // ══════════════════════════════════════════════════════
        const canvas = document.getElementById('game-canvas');
        const ctx2 = canvas.getContext('2d');

        // Responsive canvas
        function resizeCanvas() {
            const w = Math.min(700, window.innerWidth);
            canvas.style.width = w + 'px';
            canvas.style.height = (w * 320 / 700) + 'px';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let gameState = 'menu'; // menu | countdown | racing | challenge | podium
        let level = 1;
        let score = 0;
        let streak = 0;
        let lap = 1;
        const TOTAL_LAPS = 3;

        // Racers
        const TRACK_LEN = 1000; // units
        let player = { pos: 0, speed: 0, baseSpeed: 3.2, boost: 0, penalty: 0, emoji: '💩' };
        let computer = { pos: 0, speed: 0, baseSpeed: 3.0, boost: 0, penalty: 0, emoji: '🤖' };

        // Challenge
        let challengeTimer = 0;
        let challengeDuration = 8000; // ms
        let challengeStart = 0;
        let currentQuestion = null;
        let questionQueue = [];
        let nextChallengeAt = 0; // player.pos where next challenge triggers
        let challengeInterval = 160; // every ~160 units
        let answered = false;
        let countdownVal = 3;
        let countdownTimer = 0;

        // Particles
        let particles = [];
        // Track scroll
        let trackOffset = 0;
        let lastTime = 0;

        // ══════════════════════════════════════════════════════
        //  INIT
        // ══════════════════════════════════════════════════════
        function showMenu() {
            document.getElementById('menu-screen').classList.remove('hidden');
            document.getElementById('podium-screen').classList.add('hidden');
            gameState = 'menu';
        }

        function startGame(lvl) {
            level = lvl;
            score = 0; streak = 0; lap = 1;
            player.pos = 0; player.speed = 0; player.boost = 0; player.penalty = 0;
            computer.pos = 0; computer.speed = 0; computer.boost = 0; computer.penalty = 0;
            nextChallengeAt = challengeInterval * 0.5;
            questionQueue = shuffle([...QUESTIONS[level]]);
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('podium-screen').classList.add('hidden');
            document.getElementById('challenge-overlay').classList.add('hidden');
            updateHUD();
            gameState = 'countdown';
            countdownVal = 3;
            countdownTimer = Date.now();
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[arr[i], arr[j]] = [arr[j], arr[i]]; }
            return arr;
        }

        function updateHUD() {
            document.getElementById('lap-display').textContent = `LAP ${lap}/${TOTAL_LAPS}`;
            document.getElementById('score-display').textContent = `⭐ ${score} pts`;
            document.getElementById('streak-display').textContent = `🔥 ${streak} streak`;
        }

        // ══════════════════════════════════════════════════════
        //  GAME LOOP
        // ══════════════════════════════════════════════════════
        function gameLoop(now) {
            const dt = Math.min(now - lastTime, 50); // cap dt to avoid huge jumps
            lastTime = now;

            if (gameState === 'countdown') updateCountdown(dt);
            else if (gameState === 'racing') updateRacing(dt);
            else if (gameState === 'challenge') updateChallenge(dt);

            drawFrame(now);

            if (gameState !== 'podium' && gameState !== 'menu') {
                requestAnimationFrame(gameLoop);
            }
        }

        // ── COUNTDOWN ──
        function updateCountdown(dt) {
            const elapsed = Date.now() - countdownTimer;
            if (elapsed > 3500) { gameState = 'racing'; }
        }

        // ── RACING ──
        function updateRacing(dt) {
            const dtS = dt / 1000;

            // Player speed
            player.speed = player.baseSpeed + (player.boost > 0 ? 4.5 : 0) - (player.penalty > 0 ? 2.5 : 0);
            player.boost = Math.max(0, player.boost - dt);
            player.penalty = Math.max(0, player.penalty - dt);

            // Computer speed — random bursts, slightly slower base
            computer.speed = computer.baseSpeed + (computer.boost > 0 ? 3 : 0) - (computer.penalty > 0 ? 1.5 : 0);
            computer.boost = Math.max(0, computer.boost - dt);
            computer.penalty = Math.max(0, computer.penalty - dt);

            // Occasionally give computer a mini-boost (makes it feel alive)
            if (Math.random() < 0.002) computer.boost += 400;

            // Move forward
            player.pos += player.speed * dtS * 60;
            computer.pos += computer.speed * dtS * 60;

            // Track scroll based on player position
            trackOffset += player.speed * dtS * 60;

            // Update particles
            particles = particles.filter(p => { p.life -= dt; return p.life > 0; });
            particles.forEach(p => { p.x += p.vx * dtS; p.y += p.vy * dtS; p.vy += 50 * dtS; p.life -= 0; });

            // Engine rumble sound (very quiet)
            if (Math.random() < 0.02) playEngineNote(80 + player.speed * 5, 0.08, 0.02);

            // Check if lap complete
            if (player.pos >= TRACK_LEN * lap || computer.pos >= TRACK_LEN * lap) {
                if (player.pos >= TRACK_LEN * TOTAL_LAPS || computer.pos >= TRACK_LEN * TOTAL_LAPS) {
                    showPodium(player.pos >= computer.pos);
                    return;
                }
                lap++;
                nextChallengeAt = player.pos + challengeInterval * 0.3;
                updateHUD();
                addParticles(350, 160, 20, ['💨', '⭐', '🎉']);
            }

            // Trigger challenge?
            if (player.pos >= nextChallengeAt && !answered) {
                triggerChallenge();
            }
        }

        // ── CHALLENGE ──
        function updateChallenge(dt) {
            challengeTimer -= dt;
            const frac = Math.max(0, challengeTimer / challengeDuration);
            document.getElementById('challenge-timer-fill').style.width = (frac * 100) + '%';
            if (challengeTimer <= 0) {
                // Out of time — counts as wrong
                resolveAnswer(-1);
            }
        }

        // ══════════════════════════════════════════════════════
        //  DRAWING
        // ══════════════════════════════════════════════════════
        function drawFrame(now) {
            const W = 700, H = 320;
            ctx2.clearRect(0, 0, W, H);

            if (gameState === 'countdown') {
                drawTrack(W, H);
                drawRacers(W, H);
                drawCountdown(W, H);
                return;
            }

            drawTrack(W, H);
            drawProgressBar(W, H);
            drawRacers(W, H);
            drawParticles();
            if (gameState === 'racing') drawBoostEffect(W, H);
        }

        function drawTrack(W, H) {
            // Sky gradient
            const sky = ctx2.createLinearGradient(0, 0, 0, H * 0.35);
            sky.addColorStop(0, '#0d47a1'); sky.addColorStop(1, '#42a5f5');
            ctx2.fillStyle = sky; ctx2.fillRect(0, 0, W, H * 0.35);

            // Clouds
            ctx2.fillStyle = 'rgba(255,255,255,0.6)';
            drawCloud(W * 0.1 + (trackOffset * 0.05) % W, H * 0.1, 50, 25);
            drawCloud(W * 0.5 + (trackOffset * 0.03) % W, H * 0.05, 70, 30);
            drawCloud(W * 0.8 + (trackOffset * 0.04) % W, H * 0.12, 40, 20);

            // Ground
            ctx2.fillStyle = '#388E3C'; ctx2.fillRect(0, H * 0.35, W, H * 0.65);

            // Road
            const roadTop = H * 0.42, roadBot = H;
            ctx2.fillStyle = '#546E7A';
            ctx2.fillRect(0, roadTop, W, roadBot - roadTop);

            // Road edges
            ctx2.fillStyle = '#FFEB3B';
            ctx2.fillRect(0, roadTop, W, 5);
            ctx2.fillRect(0, roadBot - 5, W, 5);

            // Lane divider dashes
            const midY = (roadTop + roadBot) / 2;
            ctx2.fillStyle = 'rgba(255,255,255,0.6)';
            const dashW = 50, dashH = 5, gap = 40;
            const offset = (trackOffset * 0.8) % (dashW + gap);
            for (let x = -dashW + (offset % (dashW + gap)); x < W + dashW; x += dashW + gap) {
                ctx2.fillRect(x, midY - dashH / 2, dashW, dashH);
            }

            // Finish line (when close to lap end)
            const distToLap = (TRACK_LEN * lap) - player.pos;
            if (distToLap < 300) {
                const finishX = W - (distToLap / 300) * W * 1.2;
                drawFinishLine(finishX, roadTop, roadBot);
            }
        }

        function drawCloud(x, y, w, h) {
            ctx2.beginPath();
            ctx2.ellipse(x, y, w, h, 0, 0, Math.PI * 2);
            ctx2.ellipse(x + w * 0.4, y - h * 0.3, w * 0.7, h * 0.7, 0, 0, Math.PI * 2);
            ctx2.ellipse(x - w * 0.4, y - h * 0.2, w * 0.5, h * 0.5, 0, 0, Math.PI * 2);
            ctx2.fill();
        }

        function drawFinishLine(x, top, bot) {
            const sqSize = 18;
            let dark = false;
            for (let y = top; y < bot; y += sqSize) {
                ctx2.fillStyle = dark ? '#000' : '#fff';
                ctx2.fillRect(x, y, sqSize, sqSize);
                ctx2.fillStyle = dark ? '#fff' : '#000';
                ctx2.fillRect(x + sqSize, y, sqSize, sqSize);
                dark = !dark;
            }
            // Pole
            ctx2.fillStyle = '#ccc'; ctx2.fillRect(x - 4, top - 40, 6, 45);
            // Flag emoji
            ctx2.font = '30px serif'; ctx2.fillText('🏁', x - 15, top - 40);
        }

        function drawProgressBar(W, H) {
            // Mini race progress at top of track
            const barY = H * 0.38, barH = 12, barX = 20, barW = W - 40;
            ctx2.fillStyle = 'rgba(0,0,0,0.4)';
            ctx2.beginPath(); ctx2.roundRect(barX, barY, barW, barH, 6); ctx2.fill();

            // Total distance = TRACK_LEN * TOTAL_LAPS
            const total = TRACK_LEN * TOTAL_LAPS;
            const pFrac = Math.min(player.pos / total, 1);
            const cFrac = Math.min(computer.pos / total, 1);

            ctx2.fillStyle = '#43A047';
            ctx2.beginPath(); ctx2.roundRect(barX, barY, barW * pFrac, barH, 6); ctx2.fill();

            // 💩 and 🤖 markers
            ctx2.font = '14px serif';
            ctx2.fillText('💩', barX + barW * pFrac - 7, barY - 2);
            ctx2.fillText('🤖', barX + barW * cFrac - 7, barY + barH + 14);
        }

        function drawRacers(W, H) {
            const roadTop = H * 0.42, roadBot = H;
            const pLane = roadTop + (roadBot - roadTop) * 0.28;
            const cLane = roadTop + (roadBot - roadTop) * 0.72;
            const carX = W * 0.22; // cars stay at fixed x, track scrolls

            // Draw player car
            const pBoosting = player.boost > 0;
            drawCar(carX, pLane, player.emoji, pBoosting, player.penalty > 0);
            // Draw computer car
            const cOffsetX = carX + (player.pos - computer.pos) * 0.15;
            drawCar(Math.max(carX - W * 0.7, Math.min(W * 0.8, cOffsetX + W * 0.12)), cLane, computer.emoji, computer.boost > 0, false);
        }

        function drawCar(x, y, emoji, boosting, penalized) {
            ctx2.save();
            if (boosting) {
                ctx2.shadowColor = '#FFD600';
                ctx2.shadowBlur = 20;
                // Speed lines
                ctx2.strokeStyle = 'rgba(255,214,0,0.4)';
                ctx2.lineWidth = 3;
                for (let i = 0; i < 4; i++) {
                    const lineY = y - 20 + i * 12;
                    const lineLen = 30 + Math.random() * 20;
                    ctx2.beginPath(); ctx2.moveTo(x - 20, lineY); ctx2.lineTo(x - 20 - lineLen, lineY); ctx2.stroke();
                }
            }
            if (penalized) {
                ctx2.shadowColor = '#f44336'; ctx2.shadowBlur = 15;
            }
            ctx2.font = `${boosting ? 44 : 38}px serif`;
            ctx2.textAlign = 'center';
            ctx2.fillText(emoji, x, y + 14);
            ctx2.restore();
        }

        function drawBoostEffect(W, H) {
            if (player.boost > 1200) {
                ctx2.fillStyle = 'rgba(255,214,0,0.04)';
                ctx2.fillRect(0, 0, W, H);
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx2.globalAlpha = p.life / p.maxLife;
                ctx2.font = `${p.size}px serif`;
                ctx2.fillText(p.emoji, p.x, p.y);
            });
            ctx2.globalAlpha = 1;
        }

        function drawCountdown(W, H) {
            const elapsed = Date.now() - countdownTimer;
            ctx2.fillStyle = 'rgba(0,0,0,0.5)';
            ctx2.fillRect(0, 0, W, H);

            let text;
            if (elapsed < 1000) text = '3';
            else if (elapsed < 2000) text = '2';
            else if (elapsed < 3000) text = '1';
            else text = 'GO! 💨';

            ctx2.font = 'bold 100px Bangers, serif';
            ctx2.fillStyle = elapsed < 3000 ? '#FFD600' : '#4CAF50';
            ctx2.textAlign = 'center';
            ctx2.shadowColor = elapsed < 3000 ? '#FF6F00' : '#1B5E20';
            ctx2.shadowBlur = 20;
            ctx2.fillText(text, W / 2, H / 2 + 35);
            ctx2.shadowBlur = 0;
            ctx2.textAlign = 'left';
        }

        // ══════════════════════════════════════════════════════
        //  CHALLENGE LOGIC
        // ══════════════════════════════════════════════════════
        function triggerChallenge() {
            gameState = 'challenge';
            if (questionQueue.length === 0) questionQueue = shuffle([...QUESTIONS[level]]);
            currentQuestion = questionQueue.pop();
            answered = false;
            challengeTimer = challengeDuration;
            challengeStart = Date.now();

            playChallengeBell();

            document.getElementById('challenge-emoji').textContent = currentQuestion.emoji || '❓';
            document.getElementById('challenge-q').textContent = currentQuestion.q;
            document.getElementById('challenge-hint').textContent = currentQuestion.hint ? `💡 Hint: ${currentQuestion.hint}` : '';
            document.getElementById('challenge-feedback').textContent = '';

            const grid = document.getElementById('answers-grid');
            grid.innerHTML = '';
            const cols = currentQuestion.answers.length === 2 ? 'two-col' : '';
            grid.className = `answer-grid ${cols}`;

            currentQuestion.answers.forEach((ans, i) => {
                const btn = document.createElement('button');
                btn.className = 'ans-btn';
                btn.textContent = ans;
                btn.onclick = () => resolveAnswer(i);
                grid.appendChild(btn);
            });

            document.getElementById('challenge-overlay').classList.remove('hidden');
        }

        function resolveAnswer(chosen) {
            if (answered) return;
            answered = true;

            const q = currentQuestion;
            const correct = chosen === q.correct;
            const buttons = document.querySelectorAll('.ans-btn');
            buttons.forEach(b => b.disabled = true);

            if (chosen >= 0) buttons[chosen].classList.add(correct ? 'correct' : 'wrong');
            if (correct || chosen < 0) buttons[q.correct].classList.add('correct');

            const fb = document.getElementById('challenge-feedback');
            if (correct) {
                score += 10 + streak * 2;
                streak++;
                player.boost += 1800;
                fb.style.color = '#A5D6A7';
                fb.textContent = ['BRILLIANT! 🚀', 'AMAZING! ⭐', "THAT'S RIGHT! 💨", 'SUPERSTAR! 🌟', 'WOOOO! 🎉'][Math.min(streak - 1, 4)];
                playBoost();
                addParticles(350, 160, 15, ['⭐', '💫', '🌟', '💥']);
            } else {
                streak = 0;
                player.penalty += 1200;
                computer.boost += 900;
                fb.style.color = '#EF9A9A';
                fb.textContent = chosen < 0 ? '⏰ TOO SLOW! Computer zooms ahead!' : `❌ Not quite! It was: ${q.answers[q.correct]}`;
                playWrong();
            }

            updateHUD();
            nextChallengeAt = player.pos + challengeInterval + Math.random() * 80;

            setTimeout(closeChallenge, 1600);
        }

        function closeChallenge() {
            document.getElementById('challenge-overlay').classList.add('hidden');
            gameState = 'racing';
        }

        // ══════════════════════════════════════════════════════
        //  PARTICLES
        // ══════════════════════════════════════════════════════
        function addParticles(x, y, count, emojis) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 60 + Math.random() * 120;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 50,
                    emoji: emojis[Math.floor(Math.random() * emojis.length)],
                    size: 16 + Math.random() * 14,
                    life: 600 + Math.random() * 500,
                    maxLife: 1100
                });
            }
        }

        // ══════════════════════════════════════════════════════
        //  PODIUM
        // ══════════════════════════════════════════════════════
        function showPodium(playerWon) {
            gameState = 'podium';
            playWin();
            document.getElementById('challenge-overlay').classList.add('hidden');

            const trophy = document.getElementById('podium-trophy');
            const title = document.getElementById('podium-title');
            const stats = document.getElementById('podium-stats');

            if (playerWon) {
                trophy.textContent = '🏆';
                title.textContent = 'YOU WIN!!! 🎉';
                title.style.color = '#FFD600';
            } else {
                trophy.textContent = '💩';
                title.textContent = 'SO CLOSE! 😅';
                title.style.color = '#FF9800';
            }

            const rating = score >= 80 ? '⭐⭐⭐ SPELLING SUPERSTAR!' : score >= 40 ? '⭐⭐ Great job!' : '⭐ Keep practising!';
            stats.innerHTML = `
    <p style="margin:0.3rem 0">You scored <strong>${score} points</strong></p>
    <p style="margin:0.3rem 0">Best streak: ${streak > 0 ? streak : ''} 🔥</p>
    <p style="margin:0.5rem 0; font-size:1.3rem">${rating}</p>
  `;

            document.getElementById('podium-screen').classList.remove('hidden');
        }

        // Start in menu
        showMenu();
    </script>
