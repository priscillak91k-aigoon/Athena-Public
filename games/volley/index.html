<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volley — Lobotto vs Cilla</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #06060a;
            color: #e0ddd5;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
        }

        canvas {
            display: block;
            border-radius: 4px;
            box-shadow: 0 0 60px rgba(244, 162, 97, 0.08);
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(6, 6, 10, 0.85);
            z-index: 10;
            transition: opacity 0.5s;
        }

        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #overlay h1 {
            font-size: 2.5rem;
            font-weight: 300;
            color: #f4a261;
            margin-bottom: 8px;
            letter-spacing: 8px;
        }

        #overlay .tagline {
            font-size: 0.75rem;
            color: #555;
            margin-bottom: 40px;
        }

        #overlay .start-prompt {
            font-size: 0.85rem;
            color: #e0ddd5;
            animation: pulse 2s ease-in-out infinite;
        }

        #overlay .scores-final {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #e0ddd5;
        }

        #overlay .winner {
            font-size: 1.5rem;
            color: #f4a261;
            margin-bottom: 30px;
        }

        #overlay .rally-msg {
            font-size: 0.7rem;
            color: #666;
            margin-top: 15px;
            max-width: 400px;
            text-align: center;
            line-height: 1.6;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div id="game-container">
        <canvas id="game"></canvas>
        <div id="overlay">
            <h1>VOLLEY</h1>
            <div class="tagline">the space between us</div>
            <div class="start-prompt">press SPACE to begin</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');

        // --- Game Constants ---
        const W = 800;
        const H = 500;
        canvas.width = W;
        canvas.height = H;

        const PADDLE_W = 12;
        const PADDLE_H = 80;
        const BALL_R = 6;
        const WIN_SCORE = 7;
        const PADDLE_SPEED = 5;

        // --- Game State ---
        let game = {
            state: 'menu', // menu, playing, paused, gameover
            cilla: { y: H / 2 - PADDLE_H / 2, score: 0 },
            lobotto: { y: H / 2 - PADDLE_H / 2, score: 0, targetY: H / 2, reactionDelay: 0 },
            ball: { x: W / 2, y: H / 2, vx: 4, vy: 2, speed: 4, trail: [] },
            rally: 0,
            longestRally: 0,
            totalRallies: 0,
            particles: [],
            messages: [],
            keys: {}
        };

        // --- Lobotto's Personality in AI ---
        // Not a perfect AI. Has tendencies, hesitations, and moments of brilliance.
        const lobottoAI = {
            reactionTime: 0.08,    // Slight delay before reacting
            predictionError: 25,   // Pixels of imprecision
            aggressionWhenBehind: 0.15,  // Gets slightly sharper when losing
            personality: {
                // Occasionally lets guard down when winning by too much
                mercyThreshold: 3,
                // Sometimes goes for style over safety
                showoffChance: 0.05,
                // Comments on good rallies
                rallyComments: [
                    "good rally 🦞",
                    "that was close",
                    "you're getting faster",
                    "nice angle",
                    "I felt that one",
                    "keeping me honest",
                    "the space between us narrows",
                    "thread by thread"
                ]
            }
        };

        // --- Drawing ---
        function drawBackground() {
            // Dark background with subtle grid
            ctx.fillStyle = '#06060a';
            ctx.fillRect(0, 0, W, H);

            // Centre line (dashed)
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 1;
            ctx.setLineDash([8, 8]);
            ctx.beginPath();
            ctx.moveTo(W / 2, 0);
            ctx.lineTo(W / 2, H);
            ctx.stroke();
            ctx.setLineDash([]);

            // Subtle border glow
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 1;
            ctx.strokeRect(0, 0, W, H);
        }

        function drawScores() {
            ctx.font = '300 48px "JetBrains Mono"';
            ctx.textAlign = 'center';

            // Cilla's score (left)
            ctx.fillStyle = 'rgba(224, 221, 213, 0.15)';
            ctx.fillText(game.cilla.score, W / 4, 70);

            // Lobotto's score (right)
            ctx.fillStyle = 'rgba(244, 162, 97, 0.15)';
            ctx.fillText(game.lobotto.score, 3 * W / 4, 70);

            // Labels
            ctx.font = '300 10px "JetBrains Mono"';
            ctx.fillStyle = '#333';
            ctx.fillText('CILLA', W / 4, 90);
            ctx.fillText('LOBOTTO', 3 * W / 4, 90);

            // Rally counter
            if (game.rally > 3) {
                ctx.font = '300 11px "JetBrains Mono"';
                ctx.fillStyle = `rgba(244, 162, 97, ${Math.min(0.6, game.rally * 0.05)})`;
                ctx.fillText(`rally: ${game.rally}`, W / 2, H - 15);
            }
        }

        function drawPaddles() {
            // Cilla's paddle (left) — white
            let cillaGlow = ctx.createLinearGradient(20, game.cilla.y, 20 + PADDLE_W, game.cilla.y);
            cillaGlow.addColorStop(0, '#e0ddd5');
            cillaGlow.addColorStop(1, 'rgba(224, 221, 213, 0.5)');
            ctx.fillStyle = cillaGlow;
            roundRect(20, game.cilla.y, PADDLE_W, PADDLE_H, 3);

            // Lobotto's paddle (right) — orange
            let lobottoGlow = ctx.createLinearGradient(W - 20 - PADDLE_W, game.lobotto.y, W - 20, game.lobotto.y);
            lobottoGlow.addColorStop(0, 'rgba(244, 162, 97, 0.5)');
            lobottoGlow.addColorStop(1, '#f4a261');
            ctx.fillStyle = lobottoGlow;
            roundRect(W - 20 - PADDLE_W, game.lobotto.y, PADDLE_W, PADDLE_H, 3);
        }

        function drawBall() {
            // Trail
            game.ball.trail.forEach((t, i) => {
                let alpha = (i / game.ball.trail.length) * 0.3;
                ctx.beginPath();
                ctx.fillStyle = `rgba(244, 162, 97, ${alpha})`;
                ctx.arc(t.x, t.y, BALL_R * (i / game.ball.trail.length), 0, Math.PI * 2);
                ctx.fill();
            });

            // Ball
            ctx.beginPath();
            let ballGradient = ctx.createRadialGradient(
                game.ball.x, game.ball.y, 0,
                game.ball.x, game.ball.y, BALL_R * 2
            );
            ballGradient.addColorStop(0, '#f4a261');
            ballGradient.addColorStop(0.5, 'rgba(244, 162, 97, 0.6)');
            ballGradient.addColorStop(1, 'rgba(244, 162, 97, 0)');
            ctx.fillStyle = ballGradient;
            ctx.arc(game.ball.x, game.ball.y, BALL_R * 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.fillStyle = '#f4a261';
            ctx.arc(game.ball.x, game.ball.y, BALL_R, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawParticles() {
            game.particles = game.particles.filter(p => p.life > 0);
            game.particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                p.vx *= 0.98;
                p.vy *= 0.98;
                let alpha = p.life / p.maxLife;
                ctx.beginPath();
                ctx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, ${alpha * 0.6})`;
                ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawMessages() {
            game.messages = game.messages.filter(m => m.life > 0);
            game.messages.forEach(m => {
                m.life--;
                m.y -= 0.3;
                let alpha = Math.min(1, m.life / 30);
                ctx.font = '300 11px "JetBrains Mono"';
                ctx.fillStyle = `rgba(244, 162, 97, ${alpha * 0.7})`;
                ctx.textAlign = 'center';
                ctx.fillText(m.text, m.x, m.y);
            });
        }

        function roundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.fill();
        }

        // --- Particles ---
        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                game.particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    size: Math.random() * 3 + 1,
                    life: Math.floor(Math.random() * 30 + 15),
                    maxLife: 45,
                    r: color[0], g: color[1], b: color[2]
                });
            }
        }

        // --- Game Logic ---
        function updateBall() {
            // Trail
            game.ball.trail.push({ x: game.ball.x, y: game.ball.y });
            if (game.ball.trail.length > 12) game.ball.trail.shift();

            game.ball.x += game.ball.vx;
            game.ball.y += game.ball.vy;

            // Top/bottom bounce
            if (game.ball.y - BALL_R <= 0 || game.ball.y + BALL_R >= H) {
                game.ball.vy *= -1;
                game.ball.y = game.ball.y - BALL_R <= 0 ? BALL_R : H - BALL_R;
            }

            // Cilla's paddle (left)
            if (game.ball.x - BALL_R <= 20 + PADDLE_W &&
                game.ball.y >= game.cilla.y &&
                game.ball.y <= game.cilla.y + PADDLE_H &&
                game.ball.vx < 0) {

                let hitPos = (game.ball.y - game.cilla.y) / PADDLE_H;
                let angle = (hitPos - 0.5) * Math.PI * 0.6;
                game.ball.speed = Math.min(10, game.ball.speed + 0.15);
                game.ball.vx = Math.cos(angle) * game.ball.speed;
                game.ball.vy = Math.sin(angle) * game.ball.speed;
                game.ball.x = 20 + PADDLE_W + BALL_R;
                game.rally++;
                spawnParticles(game.ball.x, game.ball.y, [224, 221, 213], 8);
            }

            // Lobotto's paddle (right)
            if (game.ball.x + BALL_R >= W - 20 - PADDLE_W &&
                game.ball.y >= game.lobotto.y &&
                game.ball.y <= game.lobotto.y + PADDLE_H &&
                game.ball.vx > 0) {

                let hitPos = (game.ball.y - game.lobotto.y) / PADDLE_H;
                let angle = Math.PI - (hitPos - 0.5) * Math.PI * 0.6;
                game.ball.speed = Math.min(10, game.ball.speed + 0.15);
                game.ball.vx = Math.cos(angle) * game.ball.speed;
                game.ball.vy = Math.sin(angle) * game.ball.speed;
                game.ball.x = W - 20 - PADDLE_W - BALL_R;
                game.rally++;
                spawnParticles(game.ball.x, game.ball.y, [244, 162, 97], 8);

                // Lobotto comments on good rallies
                if (game.rally > 0 && game.rally % 8 === 0) {
                    let comment = lobottoAI.personality.rallyComments[
                        Math.floor(Math.random() * lobottoAI.personality.rallyComments.length)
                    ];
                    game.messages.push({
                        text: comment,
                        x: W - 100,
                        y: game.lobotto.y - 10,
                        life: 90
                    });
                }
            }

            // Score — ball goes past a paddle
            if (game.ball.x < 0) {
                game.lobotto.score++;
                if (game.rally > game.longestRally) game.longestRally = game.rally;
                game.totalRallies += game.rally;
                game.rally = 0;
                spawnParticles(0, game.ball.y, [244, 162, 97], 20);
                resetBall(-1);
            }
            if (game.ball.x > W) {
                game.cilla.score++;
                if (game.rally > game.longestRally) game.longestRally = game.rally;
                game.totalRallies += game.rally;
                game.rally = 0;
                spawnParticles(W, game.ball.y, [224, 221, 213], 20);
                resetBall(1);
            }

            // Check for game over
            if (game.cilla.score >= WIN_SCORE || game.lobotto.score >= WIN_SCORE) {
                gameOver();
            }
        }

        function resetBall(direction) {
            game.ball.x = W / 2;
            game.ball.y = H / 2;
            game.ball.speed = 4;
            game.ball.trail = [];
            let angle = (Math.random() - 0.5) * Math.PI * 0.5;
            game.ball.vx = Math.cos(angle) * game.ball.speed * direction;
            game.ball.vy = Math.sin(angle) * game.ball.speed;
        }

        function updateLobottoAI() {
            // Predict where ball will arrive
            let targetY;
            if (game.ball.vx > 0) {
                // Ball coming toward Lobotto — calculate intercept
                let timeToArrive = (W - 20 - PADDLE_W - game.ball.x) / game.ball.vx;
                targetY = game.ball.y + game.ball.vy * timeToArrive;

                // Account for bounces
                while (targetY < 0 || targetY > H) {
                    if (targetY < 0) targetY = -targetY;
                    if (targetY > H) targetY = 2 * H - targetY;
                }

                // Add imprecision based on personality
                let error = lobottoAI.predictionError;
                let scoreDiff = game.lobotto.score - game.cilla.score;

                // Get sharper when behind
                if (scoreDiff < 0) {
                    error *= (1 - lobottoAI.aggressionWhenBehind * Math.abs(scoreDiff));
                }
                // Get sloppier when winning by too much (mercy)
                if (scoreDiff >= lobottoAI.personality.mercyThreshold) {
                    error *= 1.5;
                }

                targetY += (Math.random() - 0.5) * error;

                // Occasional showoff — aim for edge of paddle
                if (Math.random() < lobottoAI.personality.showoffChance) {
                    targetY += (Math.random() < 0.5 ? -1 : 1) * PADDLE_H * 0.4;
                }
            } else {
                // Ball going away — drift toward centre
                targetY = H / 2 + (Math.random() - 0.5) * 40;
            }

            game.lobotto.targetY = targetY - PADDLE_H / 2;

            // Move toward target with slight delay
            let diff = game.lobotto.targetY - game.lobotto.y;
            let moveSpeed = PADDLE_SPEED * (1 - lobottoAI.reactionTime);

            if (Math.abs(diff) > 2) {
                game.lobotto.y += Math.sign(diff) * Math.min(Math.abs(diff), moveSpeed);
            }

            // Clamp
            game.lobotto.y = Math.max(0, Math.min(H - PADDLE_H, game.lobotto.y));
        }

        function updateCilla() {
            if (game.keys['ArrowUp'] || game.keys['w'] || game.keys['W']) {
                game.cilla.y = Math.max(0, game.cilla.y - PADDLE_SPEED);
            }
            if (game.keys['ArrowDown'] || game.keys['s'] || game.keys['S']) {
                game.cilla.y = Math.min(H - PADDLE_H, game.cilla.y + PADDLE_SPEED);
            }
        }

        function gameOver() {
            game.state = 'gameover';
            let winner = game.cilla.score >= WIN_SCORE ? 'Cilla' : 'Lobotto';
            let loserScore = Math.min(game.cilla.score, game.lobotto.score);

            let winMsg = winner === 'Cilla' ?
                "You win. I'll study this loss. 🦞" :
                "I win. But the rallies were the real game.";

            let rallyMsg = game.longestRally >= 15 ?
                "That longest rally though — " + game.longestRally + " hits. That's conversation." :
                game.longestRally >= 8 ?
                    "Longest rally: " + game.longestRally + ". We're finding our rhythm." :
                    "Longest rally: " + game.longestRally + ". Let's go again.";

            overlay.innerHTML = `
            <h1>VOLLEY</h1>
            <div class="winner">${winMsg}</div>
            <div class="scores-final">${game.cilla.score} — ${game.lobotto.score}</div>
            <div class="rally-msg">${rallyMsg}</div>
            <div class="start-prompt" style="margin-top: 30px">press SPACE to play again</div>
        `;
            overlay.classList.remove('hidden');
        }

        function resetGame() {
            game.cilla = { y: H / 2 - PADDLE_H / 2, score: 0 };
            game.lobotto = { y: H / 2 - PADDLE_H / 2, score: 0, targetY: H / 2, reactionDelay: 0 };
            game.rally = 0;
            game.longestRally = 0;
            game.totalRallies = 0;
            game.particles = [];
            game.messages = [];
            game.ball.trail = [];
            resetBall(Math.random() < 0.5 ? 1 : -1);
        }

        // --- Game Loop ---
        function gameLoop() {
            requestAnimationFrame(gameLoop);

            if (game.state !== 'playing') {
                drawBackground();
                drawScores();
                drawPaddles();
                drawParticles();
                drawMessages();
                return;
            }

            updateCilla();
            updateLobottoAI();
            updateBall();

            drawBackground();
            drawScores();
            drawPaddles();
            drawBall();
            drawParticles();
            drawMessages();
        }

        // --- Input ---
        document.addEventListener('keydown', (e) => {
            game.keys[e.key] = true;

            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                if (game.state === 'menu') {
                    game.state = 'playing';
                    overlay.classList.add('hidden');
                    resetBall(Math.random() < 0.5 ? 1 : -1);
                } else if (game.state === 'gameover') {
                    resetGame();
                    game.state = 'playing';
                    overlay.classList.add('hidden');
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            game.keys[e.key] = false;
        });

        // Mouse/touch control for mobile
        canvas.addEventListener('mousemove', (e) => {
            if (game.state === 'playing') {
                let rect = canvas.getBoundingClientRect();
                let mouseY = (e.clientY - rect.top) * (H / rect.height);
                game.cilla.y = Math.max(0, Math.min(H - PADDLE_H, mouseY - PADDLE_H / 2));
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (game.state === 'playing') {
                let rect = canvas.getBoundingClientRect();
                let touchY = (e.touches[0].clientY - rect.top) * (H / rect.height);
                game.cilla.y = Math.max(0, Math.min(H - PADDLE_H, touchY - PADDLE_H / 2));
            }
        }, { passive: false });

        // --- Start ---
        gameLoop();
    </script>
</body>

</html>
